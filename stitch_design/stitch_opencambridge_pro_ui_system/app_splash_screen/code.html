<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpenCamBridge - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#343539",
                        "inverse-surface": "#e3e2e7",
                        "primary-container": "#00e5ff",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary-fixed-dim": "#00daf3",
                        "on-secondary": "#313030",
                        "tertiary": "#b1ffb5",
                        "on-secondary-container": "#bab8b7",
                        "surface-container-low": "#1a1b1f",
                        "surface-container": "#1e1f23",
                        "on-tertiary": "#003912",
                        "on-primary": "#00363d",
                        "background": "#121317",
                        "inverse-primary": "#006875",
                        "outline-variant": "#3b494c",
                        "secondary-container": "#4a4949",
                        "outline": "#849396",
                        "on-error": "#690005",
                        "on-background": "#e3e2e7",
                        "error": "#ffb4ab",
                        "on-error-container": "#ffdad6",
                        "on-primary-fixed-variant": "#004f58",
                        "surface-container-lowest": "#0d0e12",
                        "secondary-fixed": "#e5e2e1",
                        "secondary": "#c8c6c5",
                        "surface-tint": "#00daf3",
                        "inverse-on-surface": "#2f3034",
                        "on-tertiary-container": "#006727",
                        "tertiary-container": "#49ed72",
                        "on-tertiary-fixed-variant": "#00531e",
                        "on-primary-container": "#00626e",
                        "primary": "#c3f5ff",
                        "on-secondary-fixed-variant": "#474646",
                        "surface-container-high": "#292a2e",
                        "surface": "#121317",
                        "secondary-fixed-dim": "#c8c6c5",
                        "primary-fixed": "#9cf0ff",
                        "on-tertiary-fixed": "#002108",
                        "tertiary-fixed-dim": "#3ce36a",
                        "surface-bright": "#38393d",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#001f24",
                        "surface-dim": "#121317",
                        "on-surface": "#e3e2e7",
                        "on-surface-variant": "#bac9cc",
                        "surface-variant": "#343539",
                        "tertiary-fixed": "#69ff87"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "20px",
                        "sm": "8px",
                        "md": "16px",
                        "gutter": "12px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "code-md": ["JetBrains Mono"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-sm": ["11px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],

                        "code-md": ["13px", { "lineHeight": "18px", "fontWeight": "500" }]

                }
            }
        }

<style>
        body {
            background-color: #000000; /* Pure OLED Black */
            margin: 0;
            overflow: hidden; /* Prevent scrolling on splash */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #e3e2e7; /* on-background */
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #00daf3; /* primary-fixed-dim / Cyan */
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 218, 243, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 218, 243, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 218, 243, 0); }
        }

        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1s; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#000000] text-on-background font-body-md">
<!-- Central Logo Area -->
<div class="flex flex-col items-center justify-center flex-grow fade-in">
<!-- Icon -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-lg mb-lg shadow-sm">
<span class="material-symbols-outlined text-[64px] text-primary" data-icon="videocam" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                videocam
            </span>
</div>
<!-- Wordmark -->
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">
            OpenCamBridge
        </h1>
</div>
<!-- Bottom Status Area -->
<div class="absolute bottom-12 flex flex-col items-center fade-in delay-2 w-full px-lg">
<!-- Status Indicator -->
<div class="flex items-center justify-center border border-outline-variant bg-surface-container-lowest rounded-full px-md py-sm mb-md">
<span class="pulse-dot"></span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">
                Local Network Bridge Active
            </span>
</div>
<!-- Version Info -->
<div class="font-label-sm text-label-sm text-on-surface-variant opacity-70">
            v2.4.0
        </div>
</div>
</body></html>
